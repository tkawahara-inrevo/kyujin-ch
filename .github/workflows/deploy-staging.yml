name: Deploy to Staging

on:
  push:
    branches: [staging]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Create .env for build
        run: |
          cat > .env << 'EOF'
          ${{ secrets.STAGING_ENV }}
          EOF

      - name: Build
        run: npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to staging server
        run: |
          # .nextとnode_modulesをビルド環境のまま転送（ハッシュ一致を保証）
          rsync -az --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            --exclude='.git' \
            ./ ubuntu@${{ secrets.STAGING_HOST }}:~/kyujin-ch/

          # サーバー側: マイグレーション + PM2再起動
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.STAGING_HOST }} << 'ENDSSH'
            cd ~/kyujin-ch
            node_modules/.bin/prisma migrate deploy
            pm2 describe kyujin-ch-staging > /dev/null 2>&1 \
              && pm2 restart kyujin-ch-staging \
              || pm2 start npm --name kyujin-ch-staging -- start
            pm2 save
          ENDSSH

      - name: Notify result
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Staging deploy succeeded: https://staging.kyujin-ch.jp"
          else
            echo "❌ Staging deploy failed"
          fi
