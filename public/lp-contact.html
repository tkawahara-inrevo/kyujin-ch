<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ｜求人ちゃんねる</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: '#1d63e3',
        accent: '#eb0937',
        dark: '#333333',
        purple: '#7c3aed',
      },
      fontFamily: {
        sans: ['"Noto Sans JP"', 'sans-serif'],
      },
    },
  },
}
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Noto Sans JP', sans-serif; color: #333; }
</style>
</head>
<body class="bg-white">

<!-- ===== HEADER ===== -->
<header class="bg-white">
  <div class="max-w-[1100px] mx-auto flex items-center justify-between px-4 md:px-6 h-[75px]">
    <a href="https://kyujin-ch.jp" class="text-lg font-black">求人ちゃんねる</a>
    <button class="md:hidden p-2" onclick="document.getElementById('mobileMenu').classList.toggle('hidden')">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
    <nav class="hidden md:flex items-center gap-[30px]">
      <a href="https://kyujin-ch.jp" class="text-[12px] font-bold text-dark underline">求人一覧</a>
      <a href="https://share-na2.hsforms.com/1J_ElGtXjQJy2GqZLqwlWVA409jf5" class="inline-flex items-center gap-2 rounded-[50px] bg-primary h-[40px] px-6 text-[12px] font-bold text-white hover:opacity-90">資料ダウンロード ▶</a>
      <a href="https://kyujin-ch.jp/contact/" class="inline-flex items-center gap-2 rounded-[50px] bg-accent h-[40px] px-6 text-[12px] font-bold text-white hover:opacity-90">求人の掲載はこちら ▶</a>
    </nav>
  </div>
  <div id="mobileMenu" class="hidden md:hidden bg-white border-t px-4 pb-4 space-y-3">
    <a href="https://kyujin-ch.jp" class="block text-sm font-bold py-2">求人一覧</a>
    <a href="https://share-na2.hsforms.com/1J_ElGtXjQJy2GqZLqwlWVA409jf5" class="block text-center rounded-full bg-primary py-3 text-sm font-bold text-white">資料ダウンロード ▶</a>
    <a href="https://kyujin-ch.jp/contact/" class="block text-center rounded-full bg-accent py-3 text-sm font-bold text-white">求人の掲載はこちら ▶</a>
  </div>
</header>

<!-- ===== HERO ===== -->
<section class="bg-gradient-to-r from-[#7c3aed] to-[#a855f7] py-10 md:py-14">
  <div class="max-w-[800px] mx-auto px-4 text-center text-white">
    <h1 class="text-[24px] md:text-[32px] font-bold">お問い合わせ</h1>
    <p class="mt-4 text-[13px] md:text-[14px] leading-[24px]">
      サービス利用時に関する問い合わせのほか、自社の採用について課題整理からでも歓迎です。<br>
      必要事項をご記入の上、こちらからお問い合わせください。
    </p>
  </div>
</section>

<!-- ===== FORM ===== -->
<section class="bg-white py-12 md:py-16">
  <form class="max-w-[600px] mx-auto px-4" action="#" method="post">

    <!-- 会社名 -->
    <div class="mb-6">
      <label class="block text-[14px] font-bold mb-2">会社名 <span class="text-accent text-[12px]">*必須</span></label>
      <input type="text" name="company" placeholder="株式会社INREVO" required
        class="w-full border border-gray-300 rounded-md px-4 py-3 text-[14px] focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary">
    </div>

    <!-- 姓・名 -->
    <div class="mb-6 grid grid-cols-2 gap-4">
      <div>
        <label class="block text-[14px] font-bold mb-2">姓 <span class="text-accent text-[12px]">*必須</span></label>
        <input type="text" name="last_name" placeholder="山田" required
          class="w-full border border-gray-300 rounded-md px-4 py-3 text-[14px] focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary">
      </div>
      <div>
        <label class="block text-[14px] font-bold mb-2">名 <span class="text-accent text-[12px]">*必須</span></label>
        <input type="text" name="first_name" placeholder="太郎" required
          class="w-full border border-gray-300 rounded-md px-4 py-3 text-[14px] focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary">
      </div>
    </div>

    <!-- メールアドレス -->
    <div class="mb-6">
      <label class="block text-[14px] font-bold mb-2">メールアドレス <span class="text-accent text-[12px]">*必須</span></label>
      <input type="email" name="email" placeholder="inrevo@***.com" required
        class="w-full border border-gray-300 rounded-md px-4 py-3 text-[14px] focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary">
    </div>

    <!-- 電話番号 -->
    <div class="mb-6">
      <label class="block text-[14px] font-bold mb-2">電話番号 <span class="text-accent text-[12px]">*必須</span></label>
      <input type="tel" name="phone" placeholder="000-1111-2222" required
        class="w-full border border-gray-300 rounded-md px-4 py-3 text-[14px] focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary">
    </div>

    <!-- お問い合わせ種別 -->
    <div class="mb-6">
      <label class="block text-[14px] font-bold mb-3">お問い合わせ <span class="text-accent text-[12px]">*必須</span></label>
      <div class="space-y-3">
        <label class="flex items-center gap-3 cursor-pointer">
          <input type="checkbox" name="inquiry_type" value="商談のご相談" class="w-[18px] h-[18px] rounded border-gray-300">
          <span class="text-[14px]">商談のご相談</span>
        </label>
        <label class="flex items-center gap-3 cursor-pointer">
          <input type="checkbox" name="inquiry_type" value="サービスに関するお問い合わせ" class="w-[18px] h-[18px] rounded border-gray-300">
          <span class="text-[14px]">サービスに関するお問い合わせ</span>
        </label>
        <label class="flex items-center gap-3 cursor-pointer">
          <input type="checkbox" name="inquiry_type" value="採用に関するお問い合わせ" class="w-[18px] h-[18px] rounded border-gray-300">
          <span class="text-[14px]">採用に関するお問い合わせ</span>
        </label>
        <label class="flex items-center gap-3 cursor-pointer">
          <input type="checkbox" name="inquiry_type" value="取材に関するお問い合わせ" class="w-[18px] h-[18px] rounded border-gray-300">
          <span class="text-[14px]">取材に関するお問い合わせ</span>
        </label>
        <label class="flex items-center gap-3 cursor-pointer">
          <input type="checkbox" name="inquiry_type" value="そのほか" class="w-[18px] h-[18px] rounded border-gray-300">
          <span class="text-[14px]">そのほか</span>
        </label>
      </div>
    </div>

    <!-- 問い合わせ内容 -->
    <div class="mb-8">
      <label class="block text-[14px] font-bold mb-2">問い合わせ内容<span class="text-[12px] font-normal">*任意</span></label>
      <textarea name="message" rows="5"
        class="w-full border border-gray-300 rounded-md px-4 py-3 text-[14px] focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary resize-vertical"></textarea>
    </div>

    <!-- 送信ボタン -->
    <button type="submit"
      class="w-full bg-dark text-white font-bold text-[16px] py-4 rounded-md hover:opacity-90 transition">
      送信する
    </button>

  </form>
</section>

<!-- ===== FOOTER ===== -->
<footer class="bg-dark text-white">
  <div class="max-w-[1100px] mx-auto px-4 md:px-6 pt-[34px]">
    <div class="flex flex-col md:flex-row gap-8 md:gap-[200px]">
      <div class="w-full md:w-[270px]">
        <div class="text-[18px] font-bold">求人ちゃんねる</div>
        <p class="mt-[18px] text-[14px] text-gray-300">最適な仕事を見つけるためのお手伝いをします。</p>
        <div class="mt-[20px] flex items-center gap-[30px]">
          <span class="text-[12px] text-gray-400">INREVO</span>
        </div>
      </div>
      <div class="flex gap-8 md:gap-[33px]">
        <div>
          <div class="text-[14px] font-bold">求人情報</div>
          <div class="mt-[13px] space-y-[15px] text-[12px] text-gray-300">
            <a href="https://kyujin-ch.jp" class="block hover:text-white">求人一覧</a>
            <a href="https://kyujin-ch.jp" class="block hover:text-white">会社概要</a>
          </div>
        </div>
        <div>
          <div class="text-[14px] font-bold">サポート</div>
          <div class="mt-[13px] space-y-[15px] text-[12px] text-gray-300">
            <a href="https://kyujin-ch.jp/contact/" class="block hover:text-white">お問い合わせ</a>
            <a href="#" class="block hover:text-white">利用規約（求職者）</a>
            <a href="#" class="block hover:text-white">利用規約（企業）</a>
            <a href="#" class="block hover:text-white">プライバシーポリシー</a>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="mt-[40px] bg-[#222] py-[13px] text-center text-[14px] text-gray-400">
    &copy; 2026 求人ちゃんねる.all rights reserved.
  </div>
</footer>

</body>
</html>
